services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ekontaktor
      POSTGRES_USER: ekontaktor
      POSTGRES_PASSWORD: ekontaktor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekontaktor -d ekontaktor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-mirror.gcr.io/library/python:3.12-slim}
    command: >
      sh -c "mkdir -p /app/db &&
             if [ ! -f /app/db/db.sqlite3 ] && [ -f /app/db.sqlite3 ]; then cp /app/db/db.sqlite3 /app/db/db.sqlite3; fi &&
             python manage.py migrate &&
             python manage.py setup_groups &&
             python manage.py ensure_admin_user &&
             python manage.py ensure_test_subscriber &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1"
    volumes:
      - ./data:/data:ro
      - ./docs:/docs:ro
      - media_data:/app/media
      - backend_data:/app/db
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "1"
      DATABASE_URL: postgres://ekontaktor:ekontaktor@db:5432/ekontaktor
      REDIS_URL: redis://redis:6379/0
      EMAIL_HOST: mailhog
      EMAIL_PORT: "1025"
      EMAIL_USE_TLS: "False"
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      DJANGO_SETTINGS_MODULE: config.settings.dev
      CORPORATE_DOCS_ROOT: /docs
      TEST_NEWSLETTER_EMAIL: alihanskaev@gmail.com
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-mirror.gcr.io/library/python:3.12-slim}
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "1"
      DATABASE_URL: postgres://ekontaktor:ekontaktor@db:5432/ekontaktor
      REDIS_URL: redis://redis:6379/0
      EMAIL_HOST: mailhog
      EMAIL_PORT: "1025"
      EMAIL_USE_TLS: "False"
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      - backend
      - redis
      - mailhog

  celery-beat:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-mirror.gcr.io/library/python:3.12-slim}
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "1"
      DATABASE_URL: postgres://ekontaktor:ekontaktor@db:5432/ekontaktor
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    command: sh -c "rm -rf /app/.next/cache && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      INTERNAL_API_URL: http://backend:8000/api/v1
    mem_limit: 4g
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  minio_data:
  media_data:
  backend_data:
