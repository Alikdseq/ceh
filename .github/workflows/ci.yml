name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ekontaktor
          POSTGRES_USER: ekontaktor
          POSTGRES_PASSWORD: ekontaktor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install backend deps
        run: pip install -r backend/requirements/dev.txt

      - name: Ruff lint
        run: pip install ruff && ruff check backend/

      - name: Django check
        env:
          DATABASE_URL: postgres://ekontaktor:ekontaktor@localhost:5432/ekontaktor
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: ci-test-secret
        working-directory: backend
        run: |
          python manage.py check
          python manage.py migrate --noinput

      - name: Pytest
        env:
          DATABASE_URL: postgres://ekontaktor:ekontaktor@localhost:5432/ekontaktor
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: ci-test-secret
        working-directory: backend
        run: pytest -v --tb=short

      - name: pip-audit
        run: pip install pip-audit && pip-audit -r backend/requirements/base.txt --strict || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f docker/backend/Dockerfile -t ekontaktor-backend .
