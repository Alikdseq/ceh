limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=forms_limit:10m rate=1r/m;

# Docker DNS: re-resolve service names after container recreate (avoid 502 stale IP).
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP → HTTPS (оба домена)
server {
    listen 80;
    server_name ekontaktor.ru www.ekontaktor.ru;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://www.ekontaktor.ru$request_uri;
    }
}

# Редirect без www → www (канонический домен)
server {
    listen 443 ssl http2;
    server_name ekontaktor.ru;

    ssl_certificate /etc/letsencrypt/live/ekontaktor.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ekontaktor.ru/privkey.pem;

    return 301 https://www.ekontaktor.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.ekontaktor.ru;

    ssl_certificate /etc/letsencrypt/live/ekontaktor.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ekontaktor.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;

    set $backend_upstream backend:8000;
    set $frontend_upstream frontend:3000;

    location /api/v1/quotes/ {
        limit_req zone=forms_limit burst=2 nodelay;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/leads/ {
        limit_req zone=forms_limit burst=2 nodelay;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/newsletter/subscribe/ {
        limit_req zone=forms_limit burst=2 nodelay;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /manage/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://$backend_upstream;
        expires 30d;
    }

    location /media/ {
        proxy_pass http://$backend_upstream;
        expires 7d;
    }

    location / {
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
