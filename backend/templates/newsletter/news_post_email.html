<!DOCTYPE html>
<html lang="ru">
<head><meta charset="utf-8"><title>{{ news.title }}</title></head>
<body style="font-family:Arial,sans-serif;line-height:1.6;color:#222;max-width:640px;margin:0 auto;padding:24px;">
  <p style="font-size:12px;color:#666;margin:0 0 16px;">АО «Электроконтактор» — новости завода</p>
  <h1 style="font-size:22px;line-height:1.3;margin:0 0 16px;">{{ news.title }}</h1>
  {% if news.excerpt %}
    <p style="font-size:16px;margin:0 0 16px;">{{ news.excerpt }}</p>
  {% endif %}
  <div style="font-size:15px;margin:0 0 24px;">
    {{ news.body|linebreaks }}
  </div>
  <p style="margin:0 0 24px;">
    <a href="{{ news_url }}" style="display:inline-block;background:#0077af;color:#fff;text-decoration:none;padding:12px 20px;border-radius:6px;">
      Читать на сайте
    </a>
  </p>
  <hr style="margin:32px 0;border:none;border-top:1px solid #ddd;">
  <p style="font-size:12px;color:#666;margin:0;">
    Вы получили это письмо, потому что подписаны на новости АО «Электроконтактор».
    <a href="{{ unsubscribe_url }}">Отписаться</a>
  </p>
</body>
</html>
