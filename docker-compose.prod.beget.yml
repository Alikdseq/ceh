# Production overlay for Beget VPS (1–2 GB RAM, 10–15 GB disk).
# Запуск: docker compose -f docker-compose.prod.yml -f docker-compose.prod.beget.yml up -d --build
#
# 1 GB RAM: добавьте swap (см. docs/DEPLOY-BEGET.md), при OOM остановите celery.
# 2 GB RAM: штатный режим ниже; swap 1 ГБ — по желанию, для пиков при импорте каталога.

services:
  db:
    command: postgres -c shared_buffers=128MB -c max_connections=50
    mem_limit: 384m

  redis:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    mem_limit: 128m

  backend:
    build:
      dockerfile: docker/backend/Dockerfile.prod
    command: ["/app/scripts/docker-start-prod.sh"]
    environment:
      GUNICORN_WORKERS: "1"
      GUNICORN_THREADS: "4"
    mem_limit: 768m

  celery:
    build:
      dockerfile: docker/backend/Dockerfile.prod
    command: celery -A config worker -B -l info --concurrency=1
    mem_limit: 384m

  celery-beat:
    profiles: ["disabled"]

  frontend:
    environment:
      NODE_OPTIONS: --max-old-space-size=384
    mem_limit: 512m

  nginx:
    mem_limit: 64m
